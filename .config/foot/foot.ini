# Configurazione di Foot per OpenDyslexic Nerd Font e tema personalizzato

# --- Sezione Principale ---
[main]
# Dimensioni iniziali in caratteri (righe x colonne)
initial-window-size-chars=80x24
pad=5x5
# Nota: La sintassi del font è corretta. L'avviso è solo informativo.
font=OpenDyslexicM Nerd Font Mono:size=11

[colors-light]
# Sfondo chiaro, testo scuro
background=F0F0F0
foreground=202020

# Cursore (colori invertiti rispetto allo sfondo chiaro)
cursor=202020 F0F0F0

# Colori standard (adattati per leggibilità su sfondo chiaro)
regular0=202020
regular1=B01050
regular2=408020
regular3=A07010
regular4=3070A0
regular5=704080
regular6=309080
regular7=D8D8D8

# Colori brillanti
bright0=555555
bright1=D81860
bright2=5AA02C
bright3=D89824
bright4=4A93C4
bright5=9860A0
bright6=4EC9C0
bright7=FFFFFF

[colors-dark]
# Ora il cursore si definisce qui:
cursor=5D0C5A FFFFFF

background=5D0C5A
foreground=FFFFFF

regular0=000000
regular1=D81860
regular2=5AA02C
regular3=D89824
regular4=4A93C4
regular5=9860A0
regular6=4EC9C0
regular7=D8D8D8

bright0=555555
bright1=F04888
bright2=88C45A
bright3=F0B858
bright4=78B0D8
bright5=B88AD0
bright6=7ED8D4
bright7=FFFFFF

